<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>eBay Draft Lister</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 6px; }
    p.sub { font-size: 14px; color: #6e6e73; margin-bottom: 28px; }

    .upload-area {
      border: 2px dashed #d1d1d6;
      border-radius: 14px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
      position: relative;
    }
    .upload-area:hover { border-color: #0071e3; background: #f0f7ff; }
    .upload-area.has-image { border-color: #34c759; background: #f0fff4; }
    .upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 48px; margin-bottom: 12px; }
    .upload-label { font-size: 16px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
    .upload-hint { font-size: 13px; color: #6e6e73; }

    #preview {
      display: none;
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
      max-height: 280px;
      object-fit: contain;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0077ed; }
    button:disabled { background: #aeaeb2; cursor: not-allowed; }

    .status {
      display: none;
      margin-top: 24px;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .status.working { background: #fff9e6; border: 1px solid #f0c000; color: #7a5c00; }
    .status.done { background: #f0fff4; border: 1px solid #34c759; color: #1a5c2e; }
    .status.error { background: #fff0f0; border: 1px solid #ff3b30; color: #7a0000; }

    .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #e5e5ea; }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-weight: 600; color: #6e6e73; font-size: 13px; }
    .result-val { font-size: 13px; color: #1d1d1f; text-align: right; max-width: 60%; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f0c000; border-top-color: #7a5c00; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>📷 eBay Draft Lister</h1>
    <p class="sub">Take a photo, tap Create Draft — done.</p>

    <img id="preview" alt="Item preview">

    <div class="upload-area" id="uploadArea">
      <input type="file" accept="image/*" capture="environment" id="fileInput">
      <div class="upload-icon">📷</div>
      <div class="upload-label">Tap to take or choose a photo</div>
      <div class="upload-hint">JPG, PNG, HEIC · up to 10 MB</div>
    </div>

    <button id="submitBtn" disabled>Create eBay Draft</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const uploadArea = document.getElementById('uploadArea');
    const submitBtn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    let selectedFile = null;

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = 'block';
      uploadArea.classList.add('has-image');
      uploadArea.querySelector('.upload-label').textContent = file.name;
      submitBtn.disabled = false;
    });

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      submitBtn.disabled = true;
      status.className = 'status working';
      status.style.display = 'block';
      status.innerHTML = '<span class="spinner"></span> Uploading photo and starting agent… this takes about 2–3 minutes.';

      try {
        const formData = new FormData();
        formData.append('image', selectedFile);

        const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
        if (!uploadRes.ok) throw new Error('Upload failed: ' + await uploadRes.text());
        const { session_id } = await uploadRes.json();

        status.innerHTML = '<span class="spinner"></span> Identifying item and researching eBay comps…';

        // Poll for result
        let result = null;
        for (let i = 0; i < 40; i++) {
          await new Promise(r => setTimeout(r, 5000));
          const pollRes = await fetch('/api/status?session_id=' + session_id);
          const data = await pollRes.json();
          if (data.status === 'done') { result = data.result; break; }
          if (data.status === 'error') throw new Error(data.message || 'Agent error');
        }

        if (!result) throw new Error('Timed out — check eBay Seller Hub for your draft.');

        status.className = 'status done';
        status.innerHTML = `
          <strong>✅ Draft created in eBay!</strong><br><br>
          <div class="result-row"><span class="result-label">Item</span><span class="result-val">${result.item_identified}</span></div>
          <div class="result-row"><span class="result-label">Title</span><span class="result-val">${result.title}</span></div>
          <div class="result-row"><span class="result-label">Price</span><span class="result-val">$${result.price_recommended}</span></div>
          <div class="result-row"><span class="result-label">Comps</span><span class="result-val">$${result.comp_low} – $${result.comp_avg} – $${result.comp_high}</span></div>
          <div class="result-row"><span class="result-label">eBay Item ID</span><span class="result-val">${result.ebay_item_id}</span></div>
          <br>Add your photos in <strong>Seller Hub → Drafts</strong>, then publish.
        `;
        submitBtn.disabled = false;
      } catch (err) {
        status.className = 'status error';
        status.innerHTML = '❌ ' + err.message;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>eBay Draft Lister</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 6px; }
    p.sub { font-size: 14px; color: #6e6e73; margin-bottom: 28px; }

    .upload-area {
      border: 2px dashed #d1d1d6;
      border-radius: 14px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
      position: relative;
    }
    .upload-area:hover { border-color: #0071e3; background: #f0f7ff; }
    .upload-area.has-image { border-color: #34c759; background: #f0fff4; }
    .upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-label { font-size: 16px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
    .upload-hint { font-size: 13px; color: #6e6e73; }

    button {
      width: 100%;
      padding: 16px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 10px;
    }
    button:hover { background: #0077ed; }
    button:disabled { background: #aeaeb2; cursor: not-allowed; }
    #cameraBtn { background: #34c759; }
    #cameraBtn:hover { background: #30b350; }

    .job-list { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    .job {
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .job.working { background: #fff9e6; border: 1px solid #f0c000; color: #7a5c00; }
    .job.done    { background: #f0fff4; border: 1px solid #34c759; color: #1a5c2e; }
    .job.error   { background: #fff0f0; border: 1px solid #ff3b30; color: #7a0000; }

    .result-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e5e5ea; }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-weight: 600; color: #6e6e73; font-size: 12px; }
    .result-val { font-size: 12px; color: #1d1d1f; text-align: right; max-width: 60%; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #f0c000; border-top-color: #7a5c00; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>📷 eBay Draft Lister</h1>
    <p class="sub">Take or choose a photo — it becomes a scheduled eBay listing.</p>

    <div class="upload-area" id="uploadArea">
      <input type="file" accept="image/*" id="fileInput">
      <div class="upload-icon">🖼️</div>
      <div class="upload-label" id="uploadLabel">Tap to choose a photo</div>
      <div class="upload-hint">JPG, PNG, HEIC</div>
    </div>

    <button id="cameraBtn">📷 Take a New Photo</button>
    <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none">

    <button id="submitBtn" disabled>Create eBay Listing</button>

    <div class="job-list" id="jobList"></div>
  </div>

  <script>
    const fileInput   = document.getElementById('fileInput');
    const cameraInput = document.getElementById('cameraInput');
    const cameraBtn   = document.getElementById('cameraBtn');
    const uploadArea  = document.getElementById('uploadArea');
    const uploadLabel = document.getElementById('uploadLabel');
    const submitBtn   = document.getElementById('submitBtn');
    const jobList     = document.getElementById('jobList');
    let selectedFile  = null;

    function setFile(file) {
      selectedFile = file;
      uploadArea.classList.toggle('has-image', !!file);
      uploadLabel.textContent = file ? file.name : 'Tap to choose a photo';
      submitBtn.disabled = !file;
    }

    fileInput.addEventListener('change', () => fileInput.files[0] && setFile(fileInput.files[0]));
    cameraInput.addEventListener('change', () => cameraInput.files[0] && setFile(cameraInput.files[0]));
    cameraBtn.addEventListener('click', () => cameraInput.click());

    function resizeImage(file, maxPx = 1200) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let { width, height } = img;
          if (width > maxPx || height > maxPx) {
            if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
            else { width = Math.round(width * maxPx / height); height = maxPx; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          canvas.toBlob(resolve, 'image/jpeg', 0.85);
          URL.revokeObjectURL(url);
        };
        img.src = url;
      });
    }

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      submitBtn.disabled = true;
      cameraBtn.disabled = true;
      jobList.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'job working';
      card.innerHTML = `<span class="spinner"></span> <strong>${selectedFile.name}</strong> — resizing & uploading…`;
      jobList.appendChild(card);

      try {
        const resized = await resizeImage(selectedFile);
        const formData = new FormData();
        formData.append('image', resized, 'item.jpg');

        card.innerHTML = `<span class="spinner"></span> <strong>${selectedFile.name}</strong> — uploading…`;
        const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
        if (!uploadRes.ok) throw new Error('Upload failed: ' + await uploadRes.text());
        const { session_id, error } = await uploadRes.json();
        if (error) throw new Error(error);

        card.innerHTML = `<span class="spinner"></span> <strong>${selectedFile.name}</strong> — agent identifying item…`;

        let result = null;
        for (let i = 0; i < 75; i++) {
          await new Promise(r => setTimeout(r, 8000));
          const pollRes = await fetch('/api/status?session_id=' + session_id);
          const data = await pollRes.json();
          if (data.status === 'done') { result = data.result; break; }
          if (data.status === 'error') throw new Error(data.message || 'Agent error');
        }

        if (!result) throw new Error('Timed out — check eBay Seller Hub → Scheduled.');

        card.className = 'job done';
        card.innerHTML = `
          <strong>✅ ${selectedFile.name}</strong><br><br>
          <div class="result-row"><span class="result-label">Item</span><span class="result-val">${result.item_identified || '—'}</span></div>
          <div class="result-row"><span class="result-label">Title</span><span class="result-val">${result.title || '—'}</span></div>
          <div class="result-row"><span class="result-label">Price</span><span class="result-val">$${result.price_recommended || '—'}</span></div>
          <div class="result-row"><span class="result-label">Comps</span><span class="result-val">$${result.comp_low} – $${result.comp_avg} – $${result.comp_high}</span></div>
          <div class="result-row"><span class="result-label">Shipping</span><span class="result-val">${result.weight_oz < 16 ? 'First Class' : 'Priority'} · ${result.weight_oz || '?'}oz</span></div>
          <div class="result-row"><span class="result-label">eBay ID</span><span class="result-val">${result.ebay_item_id || (result.ebay_error ? '❌ ' + result.ebay_error : '—')}</span></div>
        `;
      } catch (err) {
        card.className = 'job error';
        card.innerHTML = `❌ <strong>${selectedFile.name}</strong> — ${err.message}`;
      }

      submitBtn.disabled = false;
      cameraBtn.disabled = false;
      setFile(null);
    });
  </script>
</body>
</html>
